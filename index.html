<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SalahTime — Your Daily Prayer Companion</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --navy: #1A2B4A;
    --navy-light: #2A3F66;
    --cream: #F5F1E8;
    --cream-light: #FAF7EE;
    --gold: #E8A547;
    --accent: #4A7C5D;
    --text: #1A2B4A;
    --text-soft: #5C6B82;
    --border: #E5DFD0;
}

html { scroll-behavior: smooth; }

body {
    font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
    background: var(--cream);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
}

.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 24px;
}

/* NAV */
nav {
    background: var(--navy);
    border-radius: 50px;
    padding: 14px 24px;
    margin: 20px auto 0;
    max-width: 1160px;
    position: sticky;
    top: 20px;
    z-index: 100;
}
.nav-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 700;
    font-size: 18px;
    color: white;
    text-decoration: none;
}
.logo-icon {
    width: 32px;
    height: 32px;
    background: var(--gold);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
}
.nav-links {
    display: flex;
    gap: 32px;
    align-items: center;
}
.nav-links a {
    color: rgba(255,255,255,0.8);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    transition: color 0.2s;
}
.nav-links a:hover { color: white; }
.nav-btn {
    background: white;
    color: var(--navy) !important;
    padding: 10px 24px;
    border-radius: 100px;
    font-weight: 600;
    transition: transform 0.2s;
}
.nav-btn:hover { transform: translateY(-2px); }

/* HERO */
.hero {
    background: var(--navy);
    border-radius: 32px;
    margin: 24px auto 0;
    max-width: 1160px;
    padding: 80px 60px;
    position: relative;
    overflow: hidden;
}
.hero::before {
    content: '🌙';
    position: absolute;
    top: -100px;
    right: -100px;
    font-size: 400px;
    opacity: 0.04;
    transform: rotate(-15deg);
}
.hero-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: center;
    position: relative;
    z-index: 1;
}
.hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.9);
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
